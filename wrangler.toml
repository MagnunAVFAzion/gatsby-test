# Wrangler configuration for Gatsby static site deployment to Cloudflare Pages
# See: https://developers.cloudflare.com/workers/wrangler/configuration/
# For static sites, use: npx wrangler pages deploy ./public

name = "gatsby-ecommerce-theme"
compatibility_date = "2024-01-01"

# For Cloudflare Pages static site deployment
# Gatsby builds static files to the ./public directory
pages_build_output_dir = "./public"

# Development settings for local preview
[dev]
port = 8788
local_protocol = "http"